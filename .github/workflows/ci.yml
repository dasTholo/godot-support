name: CI

on:
  pull_request:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  remove-docs:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Remove docs/ if present
        run: |
          if [ -d "docs" ] && [ -n "$(git ls-files docs/)" ]; then
            git rm -r docs/
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit -m "chore: auto-remove docs/ from PR"
            git push
          else
            echo "No tracked docs/ files found, skipping."
          fi

  build:
    runs-on: ubuntu-latest
    env:
      LOCAL_ENV_RUN: true
    steps:
      - name: Fetch Sources
        uses: actions/checkout@v5

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Plugin
        working-directory: gdscript
        run: ./gradlew buildPlugin --no-daemon

      - name: Run Tests
        working-directory: gdscript
        run: ./gradlew test --console=plain --no-daemon
