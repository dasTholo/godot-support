name: Release

on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      LOCAL_ENV_RUN: true
    steps:
      - name: Fetch Sources
        uses: actions/checkout@v5

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Plugin
        working-directory: gdscript
        run: ./gradlew buildPlugin --no-daemon

      - name: Run Tests
        working-directory: gdscript
        run: ./gradlew test --console=plain --no-daemon

      - name: Verify Plugin
        working-directory: gdscript
        run: ./gradlew verifyPluginStructure --no-daemon

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: gdscript/build/distributions/*.zip
          generate_release_notes: true
